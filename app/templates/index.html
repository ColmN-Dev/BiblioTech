{% extends "base.html" %}

{% block title %}Home | BiblioTech{% endblock %}

{% block content %}

<section class="hero">
    <div class="hero-content">
        <h1>Discover Your Next Great Read</h1>

        <p>
            Search millions of books, build your own library,
            and discover your next favourite story.
        </p>

            <div class="search-container">

                <form class="search-form" method="GET" action="{{ url_for('routes.search_results') }}">

                    <div class="search-input-wrapper">

                        <input 
                            type="text"
                            id="searchInput"
                            name="query"
                            placeholder="Search books..."
                            value="{{ query if query else '' }}"
                        >

                        <button 
                            type="button"
                            id="clearBtn"
                            class="search-clear-btn"
                            aria-label="Clear search">
                            ×
                        </button>

                    </div>

                    <button type="submit">
                        Search
                    </button>

                </form>

            </div>

    </div>
</section>


<section class="featured-books">
    <h2>Featured Books</h2>

    <div class="carousel">
        <!-- Carousel slides -->
    </div>
</section>


<section class="genre-section">
    <h2>Browse by Genre</h2>

    <div class="genre-grid">
        <div class="genre-card">
            <!-- Genre card -->
        </div>
    </div>
</section>

{% endblock %}
